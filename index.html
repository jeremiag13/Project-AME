<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyblade Community - Tournaments & Schedules</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="public-page">
    <header>
        <div class="container">
            <h1><i class="fas fa-spinner fa-spin"></i> Beyblade Community</h1>
            <nav>
                <a href="login.html" class="btn btn-primary">Login</a>
                <a href="#tournaments" class="btn btn-secondary">View Tournaments</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="hero">
            <h2>Upcoming Tournaments</h2>
            <div id="public-tournaments" class="tournament-grid">
                <!-- Tournaments loaded by JS -->
            </div>
        </section>

        <section id="tournaments">
            <h2>Latest Matches</h2>
            <iframe src="https://docs.google.com/forms/d/e/YOUR_GOOGLE_FORM_ID/viewform?embedded=true" 
                    width="100%" height="600" frameborder="0">Loading…</iframe>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        // Load public tournaments on landing
        loadPublicTournaments();
    </script>
</body>
</html>

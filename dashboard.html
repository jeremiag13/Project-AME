<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Beyblade Community</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Beyblade Dashboard</h1>
            <div class="user-info">
                <span id="userName">Loading...</span>
                <button id="logoutBtn" class="btn btn-danger"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="dashboard-grid">
            <div class="card">
                <h3>Active Tournaments</h3>
                <div id="user-tournaments"></div>
            </div>
            <div class="card">
                <h3>Upcoming Matches</h3>
                <div id="user-matches"></div>
            </div>
            <div class="card full-width">
                <h3>Register for Tournament</h3>
                <iframe src="https://docs.google.com/forms/d/e/YOUR_GOOGLE_FORM_ID/viewform?embedded=true" 
                        width="100%" height="400"></iframe>
            </div>
        </div>
    </main>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script src="user-script.js"></script>
</body>
</html>
